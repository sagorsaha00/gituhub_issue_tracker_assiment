    <div class="w-full rounded h-[100px] bg-whtie-300 shadow-balck-500/50 shadow-xl mt-4 ">
        <div class="justify-between flex">
            <div class="flex text-white items-center m-6">
                <img class="h-[50px] w-[50px]" src="/assets/github-logo.png" alt="">
                <h1 class="ml-3 text-black font-semibold font-sans">GitHub Issues Tracker</h1>

            </div>
            <div class="flex items-center gap-3 m-6">

                <input type="text" placeholder="Search issues"
                    class="px-4 py-2 w-72 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500">

                <button class="px-4 py-2 bg-indigo-600 text-white rounded   font-medium">
                    New Issue
                </button>

            </div>
        </div>
    </div>
    <div class="bg-gray-100 p-4 rounded-lg mt-6 w-[80%] mx-auto">

        <button onclick=showTabByData(event) id="all-btn"
            class="px-6 py-2 rounded-md border border-indigo-600 bg-indigo-600 text-white font-medium header-btn all-btn">
            All
        </button>

        <button onclick=showTabByData(event) id="open-btn"
            class="px-6 py-2 rounded-md border border-indigo-600 border text-gray-600 header-btn open-btn">
            Open
        </button>

        <button onclick=showTabByData(event) id="close-btn"
            class="px-6 py-2 rounded-md border border-indigo-600 border text-gray-600 header-btn close-btn ">
            Closed
        </button>


    </div>
    <div class="bg-gray-100 p-10 rounded-lg mt-6 w-[80%] mx-auto justify-between flex">
        <div>
            <h1>
                50 issues
            </h1>
            <p>
                Track and manage your project issues
            </p>
        </div>
        <div class="flex gap-3">
            <span class="">.</span>
            <h1>open</h1>
            <span>.</span>
            <h1>closed</h1>
        </div>
    </div>

    <div>

    </div>
