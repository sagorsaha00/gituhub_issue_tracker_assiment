<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>GitHub Issues Tracker</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>

<body>



    <div id="loginFromFull" class="bg-gray-100   min-h-screen w-screen flex items-center justify-center p-8">


        <div class="bg-white w-full max-w-md shadow-lg rounded-xl p-8">

            <div class="text-center">
                <img src="./assets/github-logo.png" class="w-16 h-16 mx-auto">
                <h1 class="text-2xl font-semibold mt-4">
                    GitHub Issues Tracker
                </h1>
                <p class="text-gray-500 mt-2">
                    Sign in to manage your issues
                </p>
            </div>
            <div class="mt-8">


                <label class="block text-sm font-semibold mb-1">
                    Username
                </label>

                <input id="inputValue" type="text" placeholder="Enter Username"
                    class="w-full border rounded-md h-10 px-3    focus:ring-indigo-500">

                <p class="text-indigo-600 text-sm mt-1">
                    Default: admin
                </p>

                <label class="block text-sm font-semibold mt-5 mb-1">
                    Password
                </label>

                <input  id="passwordValue" type="password" placeholder="Enter Password"
                    class="w-full border rounded-md h-10 px-3  focus:ring-indigo-500">

                <p class="text-indigo-600 text-sm mt-1">
                    Default: admin
                </p>
                <button onclick=loginFunc()
                    class="w-full bg-indigo-600 text-white h-10 rounded-md mt-6 hover:bg-indigo-700 transition">
                    Sign In
                </button>

            </div>


            <div class="text-center my-6 text-gray-400">
                OR
            </div>

            <div class="text-center text-sm">
                <p class="font-medium mb-2 text-indigo-600">
                    Demo Credentials
                </p>

                <p>
                    <span class="font-semibold text-indigo-600">Username:</span> admin
                </p>

                <p>
                    <span class="font-semibold text-indigo-600">Password:</span> admin123
                </p>
            </div>

        </div>
    </div>

    <div id="fulldataloadbody" class="hidden">


        <div class="w-full rounded h-[100px] bg-whtie-300 shadow-balck-500/50 shadow-xl mt-4 ">
            <div class="justify-between flex">
                <div class="flex text-white items-center m-6">
                    <img class="h-[50px] w-[50px]" src="/assets/github-logo.png" alt="">
                    <h1 class="ml-3 text-black font-semibold font-sans">GitHub Issues Tracker</h1>

                </div>
                <div class="flex items-center gap-3 m-6">

                    <input id="searchInput" type="text" placeholder="Search issues"
                        class="px-4 py-2 w-72 border border-gray-300 rounded-md focus:outline-none focus:border-blue-500">

                    <button onclick=searchIssues() class="px-4 py-2 bg-indigo-600 text-white rounded   font-medium">
                        New Issue
                    </button>

                </div>
            </div>
        </div>
        <div class="bg-gray-100 p-4 rounded-lg mt-6 w-[80%] mx-auto">

            <button onclick=showTabByData(event) id="all-btn"
                class="px-6 py-2 rounded-md border border-indigo-600 bg-indigo-600 text-white font-medium header-btn all-btn">
                All
            </button>

            <button onclick=showTabByData(event) id="open-btn"
                class="px-6 py-2 rounded-md border border-indigo-600 border text-gray-600 header-btn open-btn">
                Open
            </button>

            <button onclick=showTabByData(event) id="close-btn"
                class="px-6 py-2 rounded-md border border-indigo-600 border text-gray-600 header-btn close-btn ">
                Closed
            </button>


        </div>
        <div class="bg-gray-100 p-10 rounded-lg mt-6 w-[80%] mx-auto flex justify-between items-center">


            <div class="flex items-center gap-4">
                <img class="h-[40px] w-[40px]" src="./assets/Aperture.png" alt="">

                <div class="flex flex-col">
                    <h1 class="font-bold text-black">
                        <span id="issuelength"></span> issues
                    </h1>

                    <p class="text-gray-600 text-sm">
                        Track and manage your project issues
                    </p>
                </div>
            </div>


            <div class="flex items-center gap-4">
                <div class="flex items-center gap-2">
                    <span class="bg-green-600 h-[14px] w-[14px] rounded-full"></span>
                    <p>open</p>
                </div>

                <div class="flex items-center gap-2">
                    <span class="bg-indigo-600 h-[14px] w-[14px] rounded-full"></span>
                    <p>closed</p>
                </div>
            </div>

        </div>

        <div>

        </div>



        <div class="grid  md:grid-cols-3 lg:grid-cols-4 m-4 w-[80%] mx-auto mt-6 alldataGirdBox">


        </div>
        <div id="issueModal" class="fixed inset-0 bg-black/50 flex items-center justify-center hidden">

            <div class="bg-white rounded-xl shadow shadow-black/50 shadow-md p-6">



                <div id="modalContent"></div>

                <button onclick="closeModal()" class="mt-4 px-4 py-2 bg-red-500 text-white rounded">
                    Close
                </button>

            </div>

        </div>
    </div>
    <script src="/index.js"></script>
</body>

</html>
